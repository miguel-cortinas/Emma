<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <!--
      interactive-widget=resizes-visual: la barra URL solo afecta el visual viewport,
      sin recalcular el layout del documento → elimina el salto al hacer scroll en móvil.
      viewport-fit=cover: extiende hasta notch/home indicator en iOS.
    -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
  <title>Baby Shower - Emma Lucía</title>
  <meta name="description"
    content="¡Te invitamos a celebrar el Baby Shower de Emma Lucía! Acompáñanos en este día tan especial." />

  <!-- Open Graph / WhatsApp / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://emma.invitacion.workers.dev/" />
  <meta property="og:title" content="¡Baby Shower de Emma Lucía!" />
  <meta property="og:description"
    content="Acompáñanos a celebrar la dulce llegada de nuestra pequeña Emma Lucía. Toca para abrir la invitación." />
  <meta property="og:image" content="https://emma.invitacion.workers.dev/preview.jpg" />
  <meta property="og:image:width" content="676" />
  <meta property="og:image:height" content="680" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="¡Baby Shower de Emma Lucía!" />
  <meta property="twitter:description"
    content="Acompáñanos a celebrar la llegada de nuestra pequeña Emma Lucía. Toca para abrir la invitación." />
  <meta property="twitter:image" content="https://emma.invitacion.workers.dev/preview.jpg" />

  <!-- Preconnect a Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Carga de fuentes (Inter para UI, Instrument para títulos, Great Vibes para script) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
